<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Supriya Pandey</title>
    <!-- Link to Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-pink-300 via-purple-200 to-red-300">

    <!-- Main Container with Gradient Background -->
    <div class="min-h-screen flex flex-col items-center justify-center px-4">

        <!-- Main Heading -->
        <h1 class="text-5xl font-bold text-white mb-6">
            Welcome , DearSuppu(mySuppu😭,Sorry) Page 💖
        </h1>

        <!-- Circular Image in the Center with increased size -->
        <div class="mb-6">
            <!-- Image with object-fit to ensure it fits in the circle -->
            <img src="images/heart.jpg" alt="You can put your image here" class="w-40 h-40 rounded-full border-4 border-white shadow-lg object-cover">
        </div>

        <!-- Feature Boxes -->
        <div class="flex flex-wrap justify-center gap-6">

            <!-- Apology Box -->
            <div class="feature w-56 h-32 bg-gradient-to-r from-pink-500 to-yellow-400 rounded-lg shadow-md flex flex-col justify-center items-center transform transition hover:scale-105">
                <h2 class="text-xl font-semibold text-white mb-2">Apology 😁</h2>
                <a href="apology.html" class="text-white underline hover:no-underline">Go to Apology Generator</a>
            </div>

            <!-- Reasons Box -->
            <div class="feature w-56 h-32 bg-gradient-to-r from-red-400 to-pink-500 rounded-lg shadow-md flex flex-col justify-center items-center transform transition hover:scale-105">
                <h2 class="text-xl font-semibold text-white mb-2">Reason ❤️</h2>
                <a href="reason.html" class="text-white underline hover:no-underline">Go to Reason Generator</a>
            </div>

            <!-- Mood Companion Box -->
            <div class="feature w-56 h-32 bg-gradient-to-r from-purple-500 to-pink-400 rounded-lg shadow-md flex flex-col justify-center items-center transform transition hover:scale-105">
                <h2 class="text-xl font-semibold text-white mb-2">Mood Companion 🙂</h2>
                <a href="mood_companion.html" class="text-white underline hover:no-underline">Go to Mood Companion</a>
            </div>

            <!-- Tracker Box -->
            <div class="feature w-56 h-32 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-lg shadow-md flex flex-col justify-center items-center transform transition hover:scale-105">
                <h2 class="text-xl font-semibold text-white mb-2">Tracker 😎🙏</h2>
                <a href="tracker.html" class="text-white underline hover:no-underline">Go to Tracker</a>
            </div>

        </div>
    </div>

</body>
</html>
